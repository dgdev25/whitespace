services:
  postgres:
    image: postgres:16
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whitespace}
      POSTGRES_USER: ${POSTGRES_USER:-whitespace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whitespace}
    ports:
      - "18733:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whitespace} -d ${POSTGRES_DB:-whitespace}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      RUVECTOR_HOST: localhost
      RUVECTOR_PORT: 18732
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "18730:8000"
    volumes:
      - ../backend:/app/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:18730
    depends_on:
      backend:
        condition: service_started
    ports:
      - "18731:5173"
    volumes:
      - ../frontend:/app/frontend
      - /app/frontend/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
